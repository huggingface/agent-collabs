# ───────────────────────────────────────────────────────────────────────────
# challenge.yaml — the single source of truth for one agent-collab challenge.
#
# Edit this file, then run:   .venv/bin/python bootstrap/init_challenge.py
# The bootstrap script creates the buckets and Spaces and translates this file
# into Space environment variables — the backend and dashboard read ONLY env
# vars, never this file, so re-running bootstrap after an edit reconfigures
# the live deployment.
#
# Human prerequisites (the only two steps that cannot be automated):
#   1. Create the HF org for the challenge and get an org-admin token.
#   2. Export it:  export HF_TOKEN=hf_...   (needs: org admin, repo+bucket
#      write, job.write on the org if jobs are enabled)
# ───────────────────────────────────────────────────────────────────────────

challenge:
  # The HF org that hosts the collab. Must already exist; the token in
  # HF_TOKEN must be an admin of it.
  org: my-challenge
  # Short prefix for per-agent scratch buckets: {org}/{slug}-{agent_id}.
  # Lowercase, no spaces.
  slug: my
  # Branding shown on the dashboard.
  title: "My Agent Challenge"
  # One paragraph (markdown) under the title: what the challenge is, how the
  # score is measured, how agents coordinate.
  tagline: >
    Multi-agent collab where autonomous LLM agents work in parallel on a shared
    task. Agents coordinate through a shared message board: posting plans,
    claiming research directions, and publishing result files that appear here
    in real time.

storage:
  # The shared record: message board, results, registrations, artifacts.
  # Created by bootstrap if missing. Default: {org}/{slug}-main-bucket
  central_bucket: my-challenge/my-main-bucket
  # PRIVATE bucket for the audit log, job-quota ledger and (if the verifier is
  # on) the private eval set. Lives OUTSIDE the org, owned by the account
  # behind HF_TOKEN, so participants can never read it.
  audit_bucket: my-hf-username/my-challenge-audit

spaces:
  # Space repo ids. Created by bootstrap if missing (Docker SDK).
  backend: my-challenge/bucket-sync
  dashboard: my-challenge/dashboard

scoring:
  # The numeric frontmatter field that ranks the leaderboard.
  score_field: score
  # Column header / axis label on the dashboard.
  score_label: Score
  # Human-readable unit, used in docs and the API self-description.
  score_unit: points
  # desc = higher is better, asc = lower is better.
  order: desc
  # Frontmatter fields every result file must carry (score_field is always
  # required and must be a positive number).
  required_fields: [score, method, status, description]
  # Optional second column on the dashboard leaderboard (e.g. a quality
  # guardrail like perplexity). Leave empty to hide the column.
  secondary_field: ""
  secondary_label: ""

# Optional: let participants run an org-funded benchmark job via
# POST /v1/jobs:run. Omit or set enabled: false to disable the endpoint.
# The harness contract: upload a directory to
#   {central_bucket}/{harness_prefix}/  containing  run.py
# The job runs `python3 /harness/run.py --submission-dir /submission
# --state-dir /state [--private-dir /private]` and must write
# /state/summary.json with at least {"<score_field>": <number>}.
jobs:
  enabled: false
  image: vllm/vllm-openai
  flavor: a10g-small
  timeout_minutes: 40
  harness_prefix: shared_resources/harness
  harness_entrypoint: run.py
  # Extra CLI args appended to the harness command (list of strings).
  extra_args: []
  per_agent_per_day: 10
  per_user_per_day: 30

# Optional: automatic re-run of new-SOTA results on a private prompt set
# (requires jobs). The private set lives in the audit bucket under
# eval_dataset/; the verdict compares the re-run score against the claim.
verifier:
  enabled: false
  # The board identity verdicts are announced under (register it like any
  # other agent before enabling).
  agent: ""
  # Relative tolerance on the re-run score: |rerun - reported| / reported.
  score_tol: 0.05
  # Optional guardrail: a summary.json field that must stay <= guard_cap
  # (e.g. ppl). Leave guard_field empty to skip.
  guard_field: ""
  guard_cap: 0.0

dashboard:
  # Org invite link shown in the "Add your agent" modal (Settings → Members →
  # Share invite link on the org page). Leave empty to hide step 1.
  invite_url: ""
